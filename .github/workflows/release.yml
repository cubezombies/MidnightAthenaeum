name: Release

# Builds the Windows installer and publishes it to a GitHub Release. Runs on
# a version tag push (e.g. `v0.1.0`) so a normal "bump version, tag, push"
# flow gets a downloadable installer automatically; workflow_dispatch is
# there too so a run can be retried/tested without cutting a new tag.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build and publish installer
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
